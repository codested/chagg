name: Staging Changes Notify

# Fires when commits land on the default branch. The job only does real work
# when the push actually added new change entries, so it is cheap to run on
# every merge.
on:
  push:
    branches: [main]

jobs:
  notify:
    name: Notify on new staging changes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch HEAD and its parent so we can diff what this push changed.
          fetch-depth: 2

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build chagg
        run: go build -o "$GITHUB_WORKSPACE/chagg-bin" ./cmd/chagg

      - name: Discover modules
        run: |
          "$GITHUB_WORKSPACE/chagg-bin" modules --format json > modules.json

      # Detect whether this specific push added any new change entry files.
      - name: Detect new change entries in push
        id: diff
        run: |
          has_new=false
          while IFS= read -r dir; do
            new_files=$(git diff --name-only --diff-filter=A HEAD^ HEAD -- "$dir")
            if [ -n "$new_files" ]; then
              has_new=true
              break
            fi
          done < <(jq -r '.[].changes_dir' modules.json)

          echo "has_new=$has_new" >> "$GITHUB_OUTPUT"

      # Generate the full staging summary as Markdown.
      - name: Generate staging summary
        id: summary
        if: steps.diff.outputs.has_new == 'true'
        run: |
          "$GITHUB_WORKSPACE/chagg-bin" generate --only-staging > staging-summary.md
          cat staging-summary.md

      # Post a Slack notification via incoming webhook.
      # Set the SLACK_WEBHOOK_URL secret in your repo / org settings.
      # Skip this step silently when the secret is not configured.
      - name: Notify Slack
        if: steps.diff.outputs.has_new == 'true' && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          summary=$(cat staging-summary.md)

          payload=$(jq -n --arg summary "$summary" '{
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "New staging changes on main"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": $summary
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "Run `chagg release` to cut the next release."
                  }
                ]
              }
            ]
          }')

          curl -s -f -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$payload"
