version: 2

updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "15:00"
      timezone: "Europe/Copenhagen"
    groups:
      # All minor and patch updates are bundled into a single PR
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      # All security updates are bundled into a single PR (runs outside of schedule)
      security:
        applies-to: security-updates
        patterns:
          - "*"
    # Major version updates are NOT grouped → individual PRs per dependency

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "15:00"
      timezone: "Europe/Copenhagen"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      security:
        applies-to: security-updates
        patterns:
          - "*"